<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library — Digital Library</title>
  <meta name="description" content="Browse all available flipbooks in the digital library.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="library.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span>Digital Library</span>
      </a>
      <div class="topbar-controls">
        <div class="search-wrapper">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search books..." autocomplete="off">
        </div>
        <div class="sort-wrapper">
          <select id="sort-select" class="sort-select">
            <option value="title">Sort by Title</option>
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <main class="library">
    <div class="library-header">
      <h1 class="library-title">Browse Library</h1>
      <p class="library-count" id="library-count">Loading...</p>
    </div>
    <div class="loading-state" id="loading-state">
      <div class="spinner"></div>
      <p>Loading books...</p>
    </div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <h2>No books found</h2>
      <p>Try adjusting your search or check back later.</p>
    </div>
    <div class="error-state" id="error-state" style="display:none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <h2>Failed to load library</h2>
      <p id="error-message">Could not load books.json. Make sure the file exists.</p>
      <button class="retry-btn" onclick="location.reload()">Retry</button>
    </div>
    <div class="books-grid" id="books-grid"></div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>Digital Library &mdash; Interactive Flipbook Platform</p>
    </div>
  </footer>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="library.js"></script>
</body>
</html>
